project:
  name: ctr-avazu-nafi
  seed: 42
  mode: full

environment:
  platform: kaggle
  accelerator: gpu
  gpu: "T4 x2"
  precision: fp16
  num_workers: 2
  pin_memory: true

paths:
  # Raw parquet files produced by the user's chunked .gz conversion (21 files)
  raw_parquet_dir: /kaggle/working/avazu_parquet
  # Vocab-encoded parquets + metadata.json (output of prepare_from_parquet.py)
  processed_dir: /kaggle/working/avazu_processed
  # Vocab file (auto-written by prepare_from_parquet.py)
  vocab_path: /kaggle/working/avazu_processed/vocab.json
  output_dir: /kaggle/working/outputs

data:
  dataset: avazu
  target_col: click
  id_col: id
  train_ratio: 0.8
  valid_ratio: 0.1
  test_ratio: 0.1
  drop_id: true
  parse_hour: true
  # Encoding strategy: vocab=true replaces hashing trick
  use_vocab: true
  use_hashing: false
  min_freq: 4            # categories with < 4 occurrences → UNK (index 0)
  split_strategy: time   # time-based split on 'hour' column (8:1:1)

features:
  # Derived from 'hour' column (day, hour_of_day, weekday) — first 3 fields
  derived_cols:
    - day
    - hour_of_day
    - weekday
  # Original categorical columns (hex strings in raw Avazu)
  categorical_cols:
    - C1
    - banner_pos
    - site_id
    - site_domain
    - site_category
    - app_id
    - app_domain
    - app_category
    - device_id
    - device_ip
    - device_model
    - device_type
    - device_conn_type
    - C14
    - C15
    - C16
    - C17
    - C18
    - C19
    - C20
    - C21
  # Hash-based fallbacks (used only when use_vocab=false)
  hash_bucket_default: 100000
  hash_buckets:
    device_ip: 1000000
    device_id: 500000
    device_model: 10000
    site_id: 10000
    site_domain: 10000
    app_id: 10000
    app_domain: 1000
    C14: 5000
    C17: 1000
    C20: 512
    C19: 128
    C21: 128
    site_category: 64
    app_category: 64
    C1: 8
    banner_pos: 8
    C15: 16
    C16: 16
    C18: 8
    device_type: 8
    device_conn_type: 8
    day: 32
    hour_of_day: 24
    weekday: 7

# Model: aligned with paper settings
model:
  name: nafi
  embedding_dim: 16      # paper uses k=16
  dropout: 0.1
  l2_reg: 0.00001

nam:
  enabled: true
  hidden_units: [32, 32, 32]  # paper: 3 FC layers, 32-unit each
  activation: exu             # ExU activation (paper)
  exu_max_value: 1.0
  exu_weight_clip: 10.0
  dropout: 0.1

fin:
  enabled: true
  num_heads: 4
  num_layers: 2
  attention_dropout: 0.1
  use_residual: true

xdeepfm:
  cin_layers: [16, 16]

distillation:
  enabled: false
  temperature: 4.0
  alpha: 0.5
  ensemble_mode: uniform
  adaptive_hidden_units: [8]
  adaptive_learning_rate: 0.001
  adaptive_loss_weight: 1.0
  teacher_models:
    - deepfm
    - xdeepfm
    - autoint

training:
  batch_size: 2048
  epochs: 5
  optimizer: adam
  learning_rate: 0.001
  loss: logloss
  gradient_accumulation_steps: 1
  mixed_precision: true
  max_grad_norm: 5.0
  early_stopping:
    enabled: true
    monitor: valid_auc
    patience: 2
    mode: max

evaluation:
  metrics: [auc, logloss]
  save_predictions: true
  save_plots: true

checkpoint:
  save_best_only: true
  monitor: valid_auc
  mode: max
